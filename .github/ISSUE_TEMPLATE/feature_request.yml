name: Feature Request
description: Suggest a new feature or improvement
labels: ['enhancement']
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement! Describe the problem and your proposed solution.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this solve? What can't you do today?
      placeholder: I'm always frustrated when...
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would you like to happen?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any other approaches you've considered?
    validations:
      required: false
  - type: textarea
    id: flow
    attributes:
      label: Example flow
      description: If applicable, show how the DSL would look.
      render: text
    validations:
      required: false
