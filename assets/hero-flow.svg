<svg xmlns="http://www.w3.org/2000/svg" width="720" height="600" viewBox="0 0 720 600">
  <defs>
    <style>
      .bg { fill: #0d1117; }
      .chrome { fill: #161b22; }
      .dot-red { fill: #ff5f56; }
      .dot-yellow { fill: #ffbd2e; }
      .dot-green { fill: #27c93f; }
      .title-text { fill: #8b949e; font-family: -apple-system, 'Segoe UI', monospace; font-size: 13px; }
      .line-num { fill: #484f58; font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', Consolas, monospace; font-size: 13.5px; }
      .comment { fill: #8b949e; font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', Consolas, monospace; font-size: 13.5px; }
      .keyword { fill: #ff7b72; font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', Consolas, monospace; font-size: 13.5px; }
      .directive { fill: #d29922; font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', Consolas, monospace; font-size: 13.5px; }
      .variable { fill: #79c0ff; font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', Consolas, monospace; font-size: 13.5px; }
      .string { fill: #a5d6ff; font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', Consolas, monospace; font-size: 13.5px; }
      .plain { fill: #e6edf3; font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', Consolas, monospace; font-size: 13.5px; }
      .constant { fill: #d2a8ff; font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', Consolas, monospace; font-size: 13.5px; }
      .gate { fill: #7ee787; font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', Consolas, monospace; font-size: 13.5px; }
    </style>
  </defs>

  <!-- Window frame -->
  <rect class="bg" width="720" height="600" rx="10" ry="10"/>
  <rect class="chrome" x="1" y="1" width="718" height="38" rx="10" ry="10"/>
  <rect class="chrome" x="1" y="20" width="718" height="19"/>

  <!-- Traffic light dots -->
  <circle class="dot-red" cx="20" cy="20" r="6"/>
  <circle class="dot-yellow" cx="40" cy="20" r="6"/>
  <circle class="dot-green" cx="60" cy="20" r="6"/>

  <!-- Title bar -->
  <text class="title-text" x="360" y="24" text-anchor="middle">implement.flow</text>

  <!-- Code lines - y starts at 60, 22px line height -->
  <!-- Line 1: comment -->
  <text class="line-num" x="20" y="60"> 1</text>
  <text class="comment" x="52" y="60"># Self-correcting development loop</text>

  <!-- Line 2: flow: -->
  <text class="line-num" x="20" y="82"> 2</text>
  <text class="directive" x="52" y="82">flow:</text>

  <!-- Line 3: let spec -->
  <text class="line-num" x="20" y="104"> 3</text>
  <text y="104"><tspan class="keyword" x="72">let</tspan><tspan class="plain"> spec </tspan><tspan class="keyword">= prompt</tspan><tspan class="string"> "Write a spec for: </tspan><tspan class="variable">${goal}</tspan><tspan class="string">"</tspan></text>

  <!-- Line 4: let tasks -->
  <text class="line-num" x="20" y="126"> 4</text>
  <text y="126"><tspan class="keyword" x="72">let</tspan><tspan class="plain"> tasks </tspan><tspan class="keyword">= prompt</tspan><tspan class="string"> "Break into tasks: </tspan><tspan class="variable">${spec}</tspan><tspan class="string">"</tspan></text>

  <!-- Line 5: blank -->
  <text class="line-num" x="20" y="148"> 5</text>

  <!-- Line 6: while ask -->
  <text class="line-num" x="20" y="170"> 6</text>
  <text y="170"><tspan class="keyword" x="72">while</tspan><tspan class="keyword"> ask</tspan><tspan class="string"> "Remaining tasks?"</tspan><tspan class="keyword"> grounded-by</tspan><tspan class="string"> "npm test"</tspan><tspan class="keyword"> max</tspan><tspan class="constant"> 10</tspan></text>

  <!-- Line 7: foreach -->
  <text class="line-num" x="20" y="192"> 7</text>
  <text y="192"><tspan class="keyword" x="92">foreach</tspan><tspan class="plain"> task </tspan><tspan class="keyword">in</tspan><tspan class="plain"> </tspan><tspan class="variable">${tasks}</tspan></text>

  <!-- Line 8: retry -->
  <text class="line-num" x="20" y="214"> 8</text>
  <text y="214"><tspan class="keyword" x="112">retry</tspan><tspan class="keyword"> max</tspan><tspan class="constant"> 3</tspan></text>

  <!-- Line 9: prompt: Implement -->
  <text class="line-num" x="20" y="236"> 9</text>
  <text y="236"><tspan class="directive" x="132">prompt:</tspan><tspan class="string"> Implement </tspan><tspan class="variable">${task}</tspan><tspan class="string">. Follow: </tspan><tspan class="variable">${spec}</tspan></text>

  <!-- Line 10: run: npm test -->
  <text class="line-num" x="20" y="258">10</text>
  <text y="258"><tspan class="directive" x="132">run:</tspan><tspan class="string"> npm test</tspan></text>

  <!-- Line 11: if command_failed -->
  <text class="line-num" x="20" y="280">11</text>
  <text y="280"><tspan class="keyword" x="132">if</tspan><tspan class="plain"> command_failed</tspan></text>

  <!-- Line 12: prompt: Fix -->
  <text class="line-num" x="20" y="302">12</text>
  <text y="302"><tspan class="directive" x="152">prompt:</tspan><tspan class="string"> Fix the failing tests.</tspan></text>

  <!-- Line 13: end (if) -->
  <text class="line-num" x="20" y="324">13</text>
  <text class="keyword" x="132" y="324">end</text>

  <!-- Line 14: end (retry) -->
  <text class="line-num" x="20" y="346">14</text>
  <text class="keyword" x="112" y="346">end</text>

  <!-- Line 15: end (foreach) -->
  <text class="line-num" x="20" y="368">15</text>
  <text class="keyword" x="92" y="368">end</text>

  <!-- Line 16: spawn "reviewer" -->
  <text class="line-num" x="20" y="390">16</text>
  <text y="390"><tspan class="keyword" x="92">spawn</tspan><tspan class="string"> "reviewer"</tspan></text>

  <!-- Line 17: prompt: Review -->
  <text class="line-num" x="20" y="412">17</text>
  <text y="412"><tspan class="directive" x="112">prompt:</tspan><tspan class="string"> Review changes. List gaps as tasks.</tspan></text>

  <!-- Line 18: end (spawn) -->
  <text class="line-num" x="20" y="434">18</text>
  <text class="keyword" x="92" y="434">end</text>

  <!-- Line 19: await -->
  <text class="line-num" x="20" y="456">19</text>
  <text y="456"><tspan class="keyword" x="92">await</tspan><tspan class="string"> "reviewer"</tspan><tspan class="keyword"> timeout</tspan><tspan class="constant"> 120</tspan></text>

  <!-- Line 20: if findings -->
  <text class="line-num" x="20" y="478">20</text>
  <text y="478"><tspan class="keyword" x="92">if</tspan><tspan class="plain"> </tspan><tspan class="variable">${reviewer.findings}</tspan><tspan class="plain"> != </tspan><tspan class="string">"none"</tspan></text>

  <!-- Line 21: let tasks = prompt -->
  <text class="line-num" x="20" y="500">21</text>
  <text y="500"><tspan class="keyword" x="112">let</tspan><tspan class="plain"> tasks </tspan><tspan class="keyword">= prompt</tspan><tspan class="string"> "New tasks: </tspan><tspan class="variable">${reviewer.findings}</tspan><tspan class="string">"</tspan></text>

  <!-- Line 22: end (if) -->
  <text class="line-num" x="20" y="522">22</text>
  <text class="keyword" x="92" y="522">end</text>

  <!-- Line 23: end (while) -->
  <text class="line-num" x="20" y="544">23</text>
  <text class="keyword" x="72" y="544">end</text>

  <!-- Line 24: done when -->
  <text class="line-num" x="20" y="566">24</text>
  <text class="directive" x="52" y="566">done when:</text>

  <!-- Line 25: all(tests_pass, lint_pass) -->
  <text class="line-num" x="20" y="588">25</text>
  <text y="588"><tspan class="gate" x="72">all</tspan><tspan class="plain">(</tspan><tspan class="gate">tests_pass</tspan><tspan class="plain">, </tspan><tspan class="gate">lint_pass</tspan><tspan class="plain">)</tspan></text>

  <!-- Subtle border -->
  <rect x="0.5" y="0.5" width="719" height="599" rx="10" ry="10" fill="none" stroke="#30363d" stroke-width="1"/>
</svg>
