name: Cross-Platform CI Matrix

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test-matrix:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node-version: [22, 24]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm test
      - run: npm run eval:smoke:ci

      # Typecheck, lint, and format only on one combo (platform-independent checks)
      - if: matrix.os == 'ubuntu-latest' && matrix.node-version == 22
        run: npm run typecheck && npm run lint && npm run format:check && npm run spell
