name: Bug Report
description: Report a bug in prompt-language
labels: ['bug']
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill in the details below.
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: Tell us what you expected vs what actually happened.
    validations:
      required: true
  - type: textarea
    id: flow
    attributes:
      label: Flow definition
      description: The flow DSL or prompt you used.
      render: text
    validations:
      required: false
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Minimal steps to reproduce the behavior.
      value: |
        1. Install plugin: `npx @45ck/prompt-language`
        2. Run: `claude -p "..."`
        3. See error
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Plugin version
      description: Output of `npx @45ck/prompt-language status`
      placeholder: '0.2.0'
    validations:
      required: true
  - type: input
    id: node
    attributes:
      label: Node.js version
      description: Output of `node -v`
      placeholder: 'v22.0.0'
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS
        - Linux
        - Windows
        - Other
    validations:
      required: true
